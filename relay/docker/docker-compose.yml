services:
    relay:
        image: baander/cloud-relay:latest
        container_name: baander-relay
        build:
            context: ../
            dockerfile: docker/Dockerfile
        restart: unless-stopped
        ports:
            - "9502:9502"
        environment:
            APP_ENV: prod
            APP_DEBUG: "0"
        volumes:
            - relay_data:/app/data
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9502/health"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

volumes:
    relay_data:
        driver: local
