          value: '^App\\Library\\Interface\\'

    # =============================================
    # Lyrics (Domain + Infrastructure only)
    # =============================================
    - name: 'Lyrics Domain'
      collectors:
        - type: classLike
          value: '^App\\Lyrics\\Domain\\'

    - name: 'Lyrics Infrastructure'
      collectors:
