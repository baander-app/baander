        - type: classLike
          value: '^App\\Notification\\Domain\\'

    - name: 'Notification Application'
      collectors:
        - type: classLike
          value: '^App\\Notification\\Application\\'

    - name: 'Notification Infrastructure'
      collectors:
        - type: classLike
          value: '^App\\Notification\\Infrastructure\\'

    - name: 'Notification Interface'
      collectors:
        - type: classLike
          value: '^App\\Notification\\Interface\\'

    # =============================================
    # Party
    # =============================================
    - name: 'Party Domain'
      collectors:
        - type: classLike
