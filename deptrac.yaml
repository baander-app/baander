    - name: 'Filesystem Watcher'
      collectors:
        - type: classLike
          value: '^App\\Filesystem\\Watcher\\'

    # =============================================
    # Library
    # =============================================
    - name: 'Library Domain'
      collectors:
        - type: classLike
          value: '^App\\Library\\Domain\\'

    - name: 'Library Application'
      collectors:
        - type: classLike
          value: '^App\\Library\\Application\\'

    - name: 'Library Infrastructure'
