# deptrac.yaml — Deptrac v4 configuration for Bånder DDD modular monolith
#
# Enforces:
#   1. Layer ordering within each context (Domain → Application → Infrastructure / Interface)
#   2. Context isolation (no direct cross-context references except through Shared)
#   3. Infrastructure leak prevention (Domain/Application never depend on Infrastructure)
#
# Existing violations are baselined in deptrac.baseline.yaml.
# To regenerate: vendor/bin/deptrac analyse --formatter=baseline --output=deptrac.baseline.yaml

imports:
  - deptrac.baseline.yaml

deptrac:
  paths:
    - src/

  exclude_files:
    - '#.*vendor/.*#'

  analyser:
    types:
      - class
      - use

  ignore_uncovered_internal_classes: true

  formatters:
    graphviz:
      groups:
        Shared: ['Shared Domain', 'Shared Application', 'Shared Infrastructure', 'Shared Interface']
        Activity: ['Activity Domain', 'Activity Application', 'Activity Infrastructure', 'Activity Interface']
        Auth: ['Auth Domain', 'Auth Application', 'Auth Infrastructure', 'Auth Interface']
        Catalog: ['Catalog Domain', 'Catalog Application', 'Catalog Infrastructure', 'Catalog Interface']
        Filesystem: ['Filesystem Application', 'Filesystem Command', 'Filesystem Mime', 'Filesystem Watcher']
        Library: ['Library Domain', 'Library Application', 'Library Infrastructure', 'Library Interface']
        Lyrics: ['Lyrics Domain', 'Lyrics Infrastructure']
        Media: ['Media Domain', 'Media Application', 'Media Infrastructure', 'Media Interface']
        Metadata: ['Metadata Domain', 'Metadata Application', 'Metadata Infrastructure', 'Metadata Interface']
        Notification: ['Notification Domain', 'Notification Application', 'Notification Infrastructure', 'Notification Interface']
        Party: ['Party Domain', 'Party Application', 'Party Infrastructure', 'Party Interface']
        Playlist: ['Playlist Domain', 'Playlist Application', 'Playlist Infrastructure', 'Playlist Interface']
        Recommendation: ['Recommendation Domain', 'Recommendation Application', 'Recommendation Infrastructure', 'Recommendation Interface']
        Transcode: ['Transcode Domain', 'Transcode Application', 'Transcode Infrastructure', 'Transcode Interface']
        UserPreference: ['UserPreference Domain', 'UserPreference Application', 'UserPreference Infrastructure', 'UserPreference Interface']
        Discovery: ['Discovery Domain', 'Discovery Application', 'Discovery Infrastructure', 'Discovery Interface']
        Favorites: ['Favorites Domain', 'Favorites Application', 'Favorites Infrastructure', 'Favorites Interface']
        Command: ['Command Utility']

  layers:
    # =============================================
    # Shared kernel
    # =============================================
    - name: 'Shared Domain'
      collectors:
        - type: classLike
          value: '^App\\Shared\\Domain\\'

    - name: 'Shared Application'
      collectors:
        - type: classLike
          value: '^App\\Shared\\Application\\'

    - name: 'Shared Infrastructure'
      collectors:
        - type: classLike
          value: '^App\\Shared\\Infrastructure\\'

    - name: 'Shared Interface'
      collectors:
        - type: classLike
          value: '^App\\Shared\\Interface\\'

    # =============================================
    # Activity
    # =============================================
    - name: 'Activity Domain'
      collectors:
        - type: classLike
          value: '^App\\Activity\\Domain\\'

    - name: 'Activity Application'
      collectors:
        - type: classLike
          value: '^App\\Activity\\Application\\'

    - name: 'Activity Infrastructure'
      collectors:
        - type: classLike
          value: '^App\\Activity\\Infrastructure\\'

    - name: 'Activity Interface'
      collectors:
        - type: classLike
          value: '^App\\Activity\\Interface\\'

    # =============================================
    # Auth
    # =============================================
    - name: 'Auth Domain'
      collectors:
        - type: classLike
          value: '^App\\Auth\\Domain\\'

    - name: 'Auth Application'
      collectors:
        - type: classLike
          value: '^App\\Auth\\Application\\'

    - name: 'Auth Infrastructure'
      collectors:
        - type: classLike
          value: '^App\\Auth\\Infrastructure\\'

    - name: 'Auth Interface'
      collectors:
        - type: classLike
          value: '^App\\Auth\\Interface\\'

    # =============================================
    # Catalog
    # =============================================
    - name: 'Catalog Domain'
      collectors:
        - type: classLike
          value: '^App\\Catalog\\Domain\\'

    - name: 'Catalog Application'
      collectors:
        - type: classLike
          value: '^App\\Catalog\\Application\\'

    - name: 'Catalog Infrastructure'
      collectors:
        - type: classLike
          value: '^App\\Catalog\\Infrastructure\\'

    - name: 'Catalog Interface'
      collectors:
        - type: classLike
          value: '^App\\Catalog\\Interface\\'

    # =============================================
    # Filesystem (utility context, non-standard layers)
    # =============================================
    - name: 'Filesystem Application'
      collectors:
        - type: classLike
          value: '^App\\Filesystem\\Application\\'

    - name: 'Filesystem Command'
      collectors:
        - type: classLike
          value: '^App\\Filesystem\\Command\\'

    - name: 'Filesystem Mime'
      collectors:
