  ruleset:
    # =============================================
    # IDEAL RULES — these define the target architecture.
    # Existing violations are baselined in deptrac.baseline.yaml.
    #
    # Standard pattern for each context:
    #   Domain       → Shared Domain
    #   Application  → own Domain, Shared Domain, Shared Application
    #   Infrastructure → own Domain, own Application, Shared Domain, Shared Infrastructure
    #   Interface    → own Application, Shared Domain, Shared Application, Shared Interface
    # =============================================

    # --- Shared ---
    'Shared Domain': ~
    'Shared Application':
      - 'Shared Domain'
    'Shared Infrastructure':
      - 'Shared Domain'
      - 'Shared Application'
    'Shared Interface':
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Infrastructure'

    # --- Activity ---
    'Activity Domain':
      - 'Shared Domain'
    'Activity Application':
      - 'Activity Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Activity Infrastructure':
      - 'Activity Domain'
      - 'Activity Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Activity Interface':
      - 'Activity Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Auth ---
    'Auth Domain':
      - 'Shared Domain'
    'Auth Application':
      - 'Auth Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Auth Infrastructure':
      - 'Auth Domain'
      - 'Auth Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Auth Interface':
      - 'Auth Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Catalog ---
    'Catalog Domain':
      - 'Shared Domain'
    'Catalog Application':
      - 'Catalog Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Catalog Infrastructure':
      - 'Catalog Domain'
      - 'Catalog Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Catalog Interface':
      - 'Catalog Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Filesystem (utility) ---
    'Filesystem Application':
      - 'Shared Domain'
    'Filesystem Command':
      - 'Filesystem Application'
      - 'Shared Domain'
    'Filesystem Mime':
      - 'Shared Domain'
    'Filesystem Watcher':
      - 'Filesystem Application'
      - 'Shared Domain'

    # --- Library ---
    'Library Domain':
      - 'Shared Domain'
    'Library Application':
      - 'Library Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Library Infrastructure':
      - 'Library Domain'
      - 'Library Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Library Interface':
      - 'Library Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Lyrics ---
    'Lyrics Domain':
      - 'Shared Domain'
    'Lyrics Infrastructure':
      - 'Lyrics Domain'
      - 'Shared Domain'
      - 'Shared Infrastructure'

    # --- Media ---
    'Media Domain':
      - 'Shared Domain'
    'Media Application':
      - 'Media Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Media Infrastructure':
      - 'Media Domain'
      - 'Media Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Media Interface':
      - 'Media Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Metadata ---
    'Metadata Domain':
      - 'Shared Domain'
    'Metadata Application':
      - 'Metadata Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Metadata Infrastructure':
      - 'Metadata Domain'
      - 'Metadata Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Metadata Interface':
      - 'Metadata Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Notification ---
    'Notification Domain':
      - 'Shared Domain'
    'Notification Application':
      - 'Notification Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Notification Infrastructure':
      - 'Notification Domain'
      - 'Notification Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Notification Interface':
      - 'Notification Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Party ---
    'Party Domain':
      - 'Shared Domain'
    'Party Application':
      - 'Party Domain'
      - 'Shared Domain'
      - 'Shared Application'
    'Party Infrastructure':
      - 'Party Domain'
      - 'Party Application'
      - 'Shared Domain'
      - 'Shared Infrastructure'
    'Party Interface':
      - 'Party Application'
      - 'Shared Domain'
      - 'Shared Application'
      - 'Shared Interface'

    # --- Playlist ---
    'Playlist Domain':
