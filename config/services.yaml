    App\Radio\Application\Port\RadioStationPortInterface:
        alias: App\Radio\Infrastructure\RadioStationService
    App\Radio\Application\Port\CountrySubscriptionPortInterface:
        alias: App\Radio\Infrastructure\CountrySubscriptionService
    App\Radio\Application\Port\StarredStationPortInterface:
        alias: App\Radio\Infrastructure\StarredStationService
    App\Radio\Application\Port\RadioSessionPortInterface:
        alias: App\Radio\Infrastructure\RadioSessionService
    App\Radio\Application\Port\StationSyncPortInterface:
        alias: App\Radio\Infrastructure\Sync\IprdStationSyncAdapter

    # --- Lyrics ---
    App\Lyrics\Domain\Repository\LyricsRepositoryInterface:
        alias: App\Lyrics\Infrastructure\Doctrine\Repository\LyricsRepository
        public: true

    App\Lyrics\Application\Port\LyricsPortInterface:
        alias: App\Lyrics\Infrastructure\Service\LyricsService

    App\Lyrics\Application\Port\LyricsAdminPortInterface:
        alias: App\Lyrics\Infrastructure\Doctrine\Repository\LyricsAdminRepository
        public: true

    App\Lyrics\Application\Port\LrclibClientInterface:
        alias: App\Lyrics\Infrastructure\Api\LrclibClient

    App\Lyrics\Infrastructure\Api\LrclibClient:
        arguments:
            $baseUrl: '%env(LRCLIB_BASE_URL)%'

    App\Shared\Application\Port\SystemSettingsPortInterface:
        alias: App\Shared\Infrastructure\Doctrine\Repository\SystemSettingRepository
    App\Shared\Application\Port\AdminAlertPortInterface:
        alias: App\Shared\Infrastructure\Event\AdminAlertService

    # --- Scheduler Domain Repository Aliases ---
    App\Scheduler\Domain\Repository\ScheduledJobRepositoryInterface:
        alias: App\Scheduler\Infrastructure\Doctrine\Repository\ScheduledJobRepository

    # --- Scheduler Application Port Aliases ---
    App\Scheduler\Application\Port\ScheduledJobPortInterface:
        alias: App\Scheduler\Infrastructure\Service\ScheduledJobService

    # --- Scheduler Registry ---
    App\Scheduler\Domain\Service\SchedulerRegistry:
        arguments:
            $messengerCommandProviders: !tagged_iterator 'scheduler.messenger_command'
            $consoleCommandProviders: !tagged_iterator 'scheduler.console_command'

    # --- Scheduler CPU Pool Worker (console execution) ---
    App\Scheduler\Infrastructure\Swoole\SchedulerConsolePoolWorker:
        tags:
            - { name: 'swoole.cpu_pool_worker' }

    # --- Scheduler Swoole Process (single timer) ---
    App\Scheduler\Infrastructure\Swoole\SchedulerProcess:
        tags:
            - { name: 'swoole_bundle.bootable_service' }

    App\Scheduler\Infrastructure\Swoole\SchedulerProcessShutdownHandler:
        arguments:
            $schedulerProcessLocator: !service_locator
                App\Scheduler\Infrastructure\Swoole\SchedulerProcess: '@App\Scheduler\Infrastructure\Swoole\SchedulerProcess'
