    App\Metadata\Infrastructure\Api\Spotify\SpotifyAdapter:
        arguments:
            $clientId: '%env(SPOTIFY_CLIENT_ID)%'
            $clientSecret: '%env(SPOTIFY_CLIENT_SECRET)%'
            $jsonEncoder: '@json_encoder'

    App\Metadata\Infrastructure\Api\TasteDive\TasteDiveAdapter:
        arguments:
            $apiKey: '%env(TASTE_DIVE_API_KEY)%'
            $jsonEncoder: '@json_encoder'

    App\Metadata\Infrastructure\Admin\MetadataAdminService:
        arguments:
            $discogsToken: '%env(DISCOGS_TOKEN)%'
