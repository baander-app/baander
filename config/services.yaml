imports:
    - { resource: 'services_baander_navigator.yaml' }

# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.domain: '%env(APP_DOMAIN)%'
    app.name: '%env(APP_NAME)%'
    swoole_bundle.cache_dir: '%kernel.cache_dir%/swoole_bundle'
    app.swoole.dbal.ping_interval: 10
    app.swoole.dbal.check_active_transactions: true
    app.websocket.allowed_origins: [ ]
    app.result_stamp_classes:
        - App\Shared\Infrastructure\Messenger\Stamp\PlaylistResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\PartyMemberResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\SyncedPartySessionResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\TokenResponseResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\UserResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\PasskeyResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\MediaActivityResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\LibraryResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\TranscodeSessionResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\RecommendationResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\IntResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\FloatResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\StringResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\RadioSourceResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\RadioStationResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\RadioSessionResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\CountrySubscriptionResultStamp
        - App\Shared\Infrastructure\Messenger\Stamp\StarredStationResultStamp

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            Symfony\Component\Serializer\Encoder\JsonEncoder $jsonEncoder: '@json_encoder'
            string $resourceServerUri: '%auth.oauth.issuer%'
            $oauthKeysPrivateKeyPath: '%auth.private_key_path%'
            $oauthKeysPublicKeyPath: '%auth.public_key_path%'
            string $projectDir: '%kernel.project_dir%'
            string $databaseUrl: '%env(DATABASE_URL)%'

    json_encoder:
        class: Symfony\Component\Serializer\Encoder\JsonEncoder
        arguments:
            $defaultContext:
                json_encode_options: 4194304
                json_decode_options: 4194304

    # Register all classes in src/ as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/**/Entity/'
            - '../src/**/ValueObject/'
            - '../src/Shared/Infrastructure/Messenger/AllowedClassNormalizer.php'

    _instanceof:
        App\Scheduler\Domain\Model\SchedulableCommandInterface:
            tags: ['scheduler.messenger_command']
        App\Scheduler\Domain\Model\SchedulableConsoleCommandInterface:
            tags: ['scheduler.console_command']

    # --- Swoole DBAL Alive Keepers ---
    # Replaces swoole-bundle/resetter-bundle. Wired by DBALAliveKeeperCompilerPass
    # into the coroutine service pool via DBALPlatformAliveKeeper.
    # --- WebSocket Connection Registry ---
    # Tables must be created via WebSocketConnectionRegistry::create() in a
    # Configurator BEFORE the server starts (not in a bootable service),
    # because Swoole Tables use shared memory that must exist before fork.
    App\Shared\Infrastructure\Swoole\WebSocketConnectionRegistry:
        factory: [ 'App\Shared\Infrastructure\Swoole\WebSocketConnectionRegistry', 'create' ]

    # --- WebSocket Handler ---
    # Registers onHandshake/onOpen/onMessage/onClose on the WebSocket server.
    # Required because HttpServerFactory creates a Swoole\WebSocket\Server which
    # demands an onMessage callback before start().
    App\Shared\Infrastructure\Swoole\ReconnectionTokenService:
        factory: [ 'App\Shared\Infrastructure\Swoole\ReconnectionTokenService', 'create' ]
        arguments:
            $logger: '@monolog.logger.swoole'

    App\Shared\Interface\Controller\WebSocketController:
        tags:
            - { name: 'monolog.logger', channel: 'swoole' }

    SwooleBundle\SwooleBundle\Server\Configurator\WithWebSocketHandler:
        arguments:
            $controller: '@App\Shared\Interface\Controller\WebSocketController'
            $coWrapper: '@SwooleBundle\SwooleBundle\Bridge\Symfony\Container\CoWrapper'
            $authenticator: '@App\Shared\Infrastructure\Security\WsQueryTokenAuthenticator'
        tags:
            - { name: 'swoole_bundle.server_configurator' }

    # --- Swoole WebProfiler ---

    App\Shared\Infrastructure\Swoole\SwooleDataCollector:
        # Disable autoconfigure to prevent kernel.reset tag, which triggers
        # Swoole service-pool proxification. The proxy cannot be deserialized
        # by the Symfony profiler, breaking _wdt requests.
        autoconfigure: false
        arguments:
            $cpuProcessPoolLocator: !service_locator
                App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool: '@App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool'
            $serverConfiguration: '@?SwooleBundle\SwooleBundle\Server\HttpServerConfiguration'
        tags:
            - { name: 'data_collector', template: 'profiler/Collector/swoole.html.twig', id: 'swoole' }

    App\Shared\Infrastructure\Swoole\SwooleWorkerEventSubscriber:
        arguments:
            $cpuProcessPoolLocator: !service_locator
                App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool: '@App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool'
            $logger: '@monolog.logger.swoole'
            $qolServicesLocator: !service_locator
                App\QoL\Infrastructure\Swoole\CpuGpuSampler: '@App\QoL\Infrastructure\Swoole\CpuGpuSampler'
                App\QoL\Infrastructure\Swoole\MidStreamMonitor: '@App\QoL\Infrastructure\Swoole\MidStreamMonitor'
                App\QoL\Infrastructure\Swoole\LearningDataPersister: '@App\QoL\Infrastructure\Swoole\LearningDataPersister'
                App\QoL\Domain\Service\StreamGovernor: '@App\QoL\Domain\Service\StreamGovernor'
                App\Transcode\Infrastructure\FFmpeg\HardwareCapabilitiesProber: '@App\Transcode\Infrastructure\FFmpeg\HardwareCapabilitiesProber'
        tags:
            - { name: 'kernel.event_subscriber' }

    # Coroutine stats provider — collects from all tagged channel providers
    App\Shared\Infrastructure\Swoole\CoroutineStatsProvider:
        arguments:
            $channelProviders: !tagged_iterator app.swoole.channel_provider

    # --- Swoole DBAL Alive Keepers ---

    App\Shared\Infrastructure\Swoole\DBAL\OptimizedDBALAliveKeeper:
        abstract: true
        arguments:
            $decorated: null

    App\Shared\Infrastructure\Swoole\DBAL\TransactionFinalizingDBALAliveKeeper:
        abstract: true
        arguments:
            $decorated: null
            $logger: '@monolog.logger.swoole'

    App\Shared\Infrastructure\Swoole\DBAL\PassiveIgnoringDBALAliveKeeper:
        abstract: true
        arguments:
            $decorated: null

    # --- Shared Kernel ---
    App\Shared\Infrastructure\Doctrine\Type\CitextType:
        tags: [ 'doctrine.dbal.type' ]
    App\Shared\Infrastructure\Doctrine\Type\JobStatusType:
        tags: [ 'doctrine.dbal.type' ]
    App\Recommendation\Infrastructure\Doctrine\Type\RecommendationJobStatusType:
        tags: [ 'doctrine.dbal.type' ]
    App\Shared\Infrastructure\Doctrine\Type\PublicIdType:
        tags: [ 'doctrine.dbal.type' ]
    App\Shared\Infrastructure\Doctrine\Type\UuidType:
        tags: [ 'doctrine.dbal.type' ]

    App\Shared\Infrastructure\Doctrine\EventListener\GeneratePublicIdListener:
        tags: [ { name: 'doctrine.event_listener', event: 'prePersist' } ]

    # --- Doctrine Platform Extensions ---

    # --- PSR-7 / HTTP Message Bridge ---
    Symfony\Bridge\PsrHttpMessage\Factory\PsrHttpFactory: ~
    Symfony\Bridge\PsrHttpMessage\Factory\HttpFoundationFactory: ~

    Symfony\Bridge\PsrHttpMessage\HttpMessageFactoryInterface:
        alias: Symfony\Bridge\PsrHttpMessage\Factory\PsrHttpFactory
    Symfony\Bridge\PsrHttpMessage\HttpFoundationFactoryInterface:
        alias: Symfony\Bridge\PsrHttpMessage\Factory\HttpFoundationFactory

    # --- WebAuthn ---
    Webauthn\Counter\CounterChecker:
        alias: App\Auth\Infrastructure\Security\Passkey\AuthenticatorCounterChecker

    App\Auth\Infrastructure\Security\Passkey\PasskeyService:
        arguments:
            $appDomain: '%app.domain%'
            $appName: '%app.name%'
            $timeout: '%auth.passkey.timeout%'
            $authenticatorAttachment: '%auth.passkey.authenticator_attachment%'
            $userVerification: '%auth.passkey.user_verification%'
            $residentKey: '%auth.passkey.resident_key%'
            $attestation: '%auth.passkey.attestation%'
            $cache: '@cache.tags'
            $supportedAlgorithmIds: '%auth.passkey.algorithms%'
            $jsonEncoder: '@json_encoder'

    App\Auth\Application\Port\PasskeyVerifierInterface:
        alias: App\Auth\Infrastructure\Security\Passkey\PasskeyService

    # --- Health Check ---
    App\Shared\Infrastructure\Health\HealthCheckService:
        arguments:
            $appEnv: '%env(APP_ENV)%'
            $appSecret: '%env(APP_SECRET)%'
            $appUrl: '%env(APP_URL)%'
            $oauthEncryptionKey: '%auth.encryption_key%'
            $oauthPrivateKeyPath: '%auth.private_key_path%'
            $oauthPublicKeyPath: '%auth.public_key_path%'
            $vapidPublicKey: '%env(VAPID_PUBLIC_KEY)%'
            $vapidPrivateKey: '%env(VAPID_PRIVATE_KEY)%'
            $apiKeys:
                Discogs: '%env(DISCOGS_TOKEN)%'
                Last.fm: '%env(LASTFM_API_KEY)%'
                Spotify: '%env(SPOTIFY_CLIENT_ID)%'

    App\Shared\Interface\Controller\ConfigCheckController:
        arguments:
            $configCheckLimiter: '@limiter.config_check'

    # --- Redis Client Factory ---
    # Creates standalone Redis connections for controllers that need raw Redis access.
    # Avoids connection leaks in Swoole's long-lived worker processes by producing
    # fresh connections via a factory instead of calling new Redis() inline.
    App\Shared\Infrastructure\Redis\RedisClientFactory:
        arguments:
            $dsn: '%env(REDIS_URL)%'

    App\Shared\Interface\Controller\JobMonitorController:
        arguments:
            $redisClientFactory: '@App\Shared\Infrastructure\Redis\RedisClientFactory'

    # --- Transport Management ---
    App\Shared\Interface\Controller\TransportController:
        arguments:
            $redisClientFactory: '@App\Shared\Infrastructure\Redis\RedisClientFactory'
            $consumerName: '%env(MESSENGER_CONSUMER_NAME)%'

    # --- Rate Limiter Monitoring ---
    App\Shared\Interface\Controller\RateLimiterMonitorController:
        arguments:
            $rateLimiterCache: '@cache.rate_limiter'

    # --- TOTP ---
    App\Auth\Infrastructure\Security\Totp\TotpService:
        arguments:
            $issuer: '%auth.totp.issuer%'
            $window: '%auth.totp.window%'

    App\Auth\Application\Port\UserPortInterface:
        alias: App\Auth\Infrastructure\UserService

    App\Auth\Application\Port\TotpVerifierInterface:
        alias: App\Auth\Infrastructure\Security\Totp\TotpVerifier

    # --- DPoP (RFC 9449) ---
    App\Auth\Application\Port\DpopJtiCacheInterface:
        alias: App\Auth\Infrastructure\Cache\RedisDpopJtiCache

    App\Auth\Infrastructure\Cache\RedisDpopJtiCache:
        arguments:
            $redisClientFactory: '@App\Shared\Infrastructure\Redis\RedisClientFactory'

    App\Auth\Infrastructure\Security\OAuth\DpopProofValidator:
        arguments:
            $clockSkewSeconds: '%auth.dpop.clock_skew%'
            $jtiTtlSeconds: '%auth.access_token.ttl%'

    App\Auth\Infrastructure\Security\OAuth\DpopNonceManager:
        arguments:
            $nonceTtlSeconds: '%auth.dpop.nonce_ttl%'
            $redisClientFactory: '@App\Shared\Infrastructure\Redis\RedisClientFactory'

    App\Auth\Infrastructure\Security\OAuth\DpopBindingListener: ~

    App\Shared\Infrastructure\EventListener\DpopNonceResponseListener: ~

    App\Auth\Application\CommandHandler\Totp\EnableTotpHandler:
        arguments:
            $cache: '@cache.tags'

    App\Auth\Interface\Controller\Totp\TotpController:
        arguments:
            $cache: '@cache.tags'

    App\Auth\Interface\Controller\OAuth\AuthorizationServerMetadataController:
        arguments:
            $issuer: '%auth.oauth.issuer%'

    App\Auth\Interface\Controller\OAuth\JwksController:
        arguments:
            $publicKeyPath: '%auth.public_key_path%'

    App\Auth\Application\Port\PasswordResetTokenRepositoryInterface:
        alias: App\Auth\Infrastructure\Repository\OAuth\PasswordResetTokenRepository

    # --- Auth Rate Limiting ---
    App\Auth\Infrastructure\Security\RateLimitListener:
        arguments:
            $authLoginIpLimiter: '@limiter.auth_login_ip'
            $authLoginIpEmailLimiter: '@limiter.auth_login_ip_email'
            $authRegisterIpLimiter: '@limiter.auth_register_ip'
            $authPasswordResetIpLimiter: '@limiter.auth_password_reset_ip'
            $authRefreshClientLimiter: '@limiter.auth_refresh_client'
            $environment: '%kernel.environment%'

    # --- Admin Rate Limiting ---
    App\Catalog\Infrastructure\EventListener\AdminRateLimitListener:
        arguments:
            $batchCoverExtractLimiter: '@limiter.batch_cover_extract'
            $environment: '%kernel.environment%'

    # --- OAuth 2.0 Servers ---
    App\Auth\Infrastructure\Security\OAuth\AuthorizationServerFactory:
        arguments:
            $privateKeyPath: '%auth.private_key_path%'
            $encryptionKey: '%auth.encryption_key%'
            $verificationUri: '%auth.device.verification_uri%'
            $accessTokenTtl: '%auth.access_token.ttl%'
            $refreshTokenTtl: '%auth.refresh_token.ttl%'
            $authCodeTtl: '%auth.auth_code.ttl%'
            $deviceCodeTtl: '%auth.device_code.ttl%'

    App\Auth\Infrastructure\Security\OAuth\ResourceServerFactory:
        arguments:
            $publicKeyPath: '%auth.public_key_path%'
            $resourceServerUri: '%auth.oauth.issuer%'

    App\Auth\Interface\Console\RotateSecretsCommand:
        arguments:
            $privateKeyPath: '%auth.private_key_path%'
            $publicKeyPath: '%auth.public_key_path%'

    # --- Scope Allowlist ---
    App\Auth\Application\ScopeAllowlist:
        arguments:
            $userGrants: '%auth.scopes.user_grants%'
            $clientCredentials: '%auth.scopes.client_credentials%'

    # --- JWT Generation ---
    App\Auth\Application\Port\JwtGeneratorInterface:
        class: App\Auth\Infrastructure\Security\OAuth\JwtGenerator
        arguments:
            $privateKeyPath: '%auth.private_key_path%'
            $resourceServerUri: '%auth.oauth.issuer%'

    # --- Token Handlers ---
    App\Auth\Application\CommandHandler\OAuth\IssueTokenHandler:
        arguments:
            $accessTokenTtl: '%auth.access_token.ttl%'
            $refreshTokenTtl: '%auth.refresh_token.ttl%'

    App\Auth\Application\CommandHandler\OAuth\RefreshTokenHandler:
        arguments:
            $accessTokenTtl: '%auth.access_token.ttl%'
            $refreshTokenTtl: '%auth.refresh_token.ttl%'

    # --- Login Controllers ---
    App\Auth\Interface\Controller\User\LoginController:
        arguments:
            $spaClientId: '%auth.spa_client_id%'

    App\Auth\Interface\Controller\Passkey\PasskeyLoginController:
        arguments:
            $spaClientId: '%auth.spa_client_id%'

    # --- OAuth League Interface Aliases (Anti-Corruption Layer) ---
    League\OAuth2\Server\Repositories\AccessTokenRepositoryInterface:
        alias: App\Auth\Infrastructure\Adapter\OAuth\AccessTokenRepository
    League\OAuth2\Server\Repositories\RefreshTokenRepositoryInterface:
        alias: App\Auth\Infrastructure\Adapter\OAuth\RefreshTokenRepository
    League\OAuth2\Server\Repositories\AuthCodeRepositoryInterface:
        alias: App\Auth\Infrastructure\Adapter\OAuth\AuthCodeRepository
    League\OAuth2\Server\Repositories\ClientRepositoryInterface:
        alias: App\Auth\Infrastructure\Adapter\OAuth\ClientRepository
    League\OAuth2\Server\Repositories\DeviceCodeRepositoryInterface:
        alias: App\Auth\Infrastructure\Adapter\OAuth\DeviceCodeRepository
    League\OAuth2\Server\Repositories\ScopeRepositoryInterface:
        alias: App\Auth\Infrastructure\Adapter\OAuth\ScopeRepository

    # --- OAuth Servers (shared singletons, built once per Swoole worker) ---
    League\OAuth2\Server\AuthorizationServer:
        factory: [ '@App\Auth\Infrastructure\Security\OAuth\AuthorizationServerFactory', 'create' ]

    League\OAuth2\Server\ResourceServer:
        factory: [ '@App\Auth\Infrastructure\Security\OAuth\ResourceServerFactory', 'create' ]

    # --- Domain Repository Aliases ---
    App\Auth\Domain\Repository\OAuth\AccessTokenRepositoryInterface:
        alias: App\Auth\Infrastructure\Cache\CachedAccessTokenRepository

    App\Auth\Infrastructure\Cache\CachedAccessTokenRepository:
        decorates: App\Auth\Infrastructure\Repository\OAuth\AccessTokenRepository
        arguments:
            $cache: '@cache.tags'
    App\Auth\Domain\Repository\OAuth\RefreshTokenRepositoryInterface:
        alias: App\Auth\Infrastructure\Repository\OAuth\RefreshTokenRepository
    App\Auth\Domain\Repository\OAuth\AuthCodeRepositoryInterface:
        alias: App\Auth\Infrastructure\Repository\OAuth\AuthCodeRepository
    App\Auth\Domain\Repository\OAuth\DeviceCodeRepositoryInterface:
        alias: App\Auth\Infrastructure\Repository\OAuth\DeviceCodeRepository
    App\Auth\Domain\Repository\OAuth\ClientRepositoryInterface:
        alias: App\Auth\Infrastructure\Repository\OAuth\ClientRepository
    App\Auth\Domain\Repository\Credential\ThirdPartyCredentialRepositoryInterface:
        alias: App\Auth\Infrastructure\Repository\Credential\ThirdPartyCredentialRepository
    App\Auth\Domain\Repository\LoginBlockRepositoryInterface:
        alias: App\Auth\Infrastructure\Doctrine\Repository\LoginBlockRepository

    # --- Catalog Domain Repository Aliases ---
    App\Catalog\Domain\Repository\AlbumRepositoryInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Repository\AlbumRepository
    App\Catalog\Domain\Repository\SongRepositoryInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Repository\SongRepository
    App\Catalog\Domain\Repository\ArtistRepositoryInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Repository\ArtistRepository
    App\Catalog\Domain\Repository\GenreRepositoryInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Repository\GenreRepository
    App\Catalog\Domain\Repository\MovieRepositoryInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Repository\MovieRepository
    App\Catalog\Domain\Repository\VideoRepositoryInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Repository\VideoRepository

    # --- Catalog Application Port Aliases ---
    App\Catalog\Application\Port\ArtistPortInterface:
        alias: App\Catalog\Infrastructure\ArtistService
    App\Catalog\Application\Port\AlbumPortInterface:
        alias: App\Catalog\Infrastructure\AlbumService
    App\Catalog\Application\Port\SongPortInterface:
        alias: App\Catalog\Infrastructure\SongService
    App\Catalog\Application\Port\GenrePortInterface:
        alias: App\Catalog\Infrastructure\GenreService
    App\Catalog\Application\Port\MoviePortInterface:
        alias: App\Catalog\Infrastructure\MovieService
    App\Catalog\Application\Port\AlbumDuplicatePortInterface:
        alias: App\Catalog\Infrastructure\AlbumDuplicateService
    App\Catalog\Application\Port\AlbumMergePortInterface:
        alias: App\Catalog\Infrastructure\AlbumMergeService

    # --- Library Domain Repository Aliases ---
    App\Library\Domain\Repository\LibraryRepositoryInterface:
        alias: App\Library\Infrastructure\Doctrine\Repository\LibraryRepository

    # --- Library Ports ---
    App\Library\Application\Port\LibraryPortInterface:
        alias: App\Library\Infrastructure\LibraryService

    App\Library\Application\Port\LibraryAccessPortInterface:
        alias: App\Library\Infrastructure\Doctrine\Repository\LibraryAccessRepository
        public: true
    App\Library\Application\Port\DirectoryScannerPortInterface:
        alias: App\Library\Infrastructure\Scanner\DirectoryScanner

    App\Library\Domain\Repository\LibraryFileIndexRepositoryInterface:
        alias: App\Library\Infrastructure\Doctrine\Repository\LibraryFileIndexRepository

    App\Library\Application\Port\LibraryContentStatsInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Query\CatalogStatsQuery

    App\Catalog\Application\Port\MetadataContentReaderPortInterface:
        alias: App\Metadata\Infrastructure\Reader\MetadataContentReader

    App\Catalog\Application\Port\CatalogStatsQueryPortInterface:
        alias: App\Catalog\Infrastructure\Doctrine\Query\CatalogStatsQuery

    # --- Library Cross-Context Queries ---
    App\Library\Application\Query\LibraryMembershipQueryPort:
        alias: App\Library\Infrastructure\Doctrine\Query\LibraryMembershipQuery
    App\Library\Application\Query\LibraryStatsQueryPort:
        alias: App\Library\Infrastructure\Doctrine\Query\LibraryStatsQuery

    # --- Library Application Services ---
    App\Library\Application\PathValidator: ~

    # --- Media Domain Repository Aliases ---
    App\Media\Domain\Repository\ImageRepositoryInterface:
        alias: App\Media\Infrastructure\Doctrine\Repository\ImageRepository

    # --- Media Ports ---
    App\Media\Application\Port\ImagePortInterface:
        alias: App\Media\Infrastructure\ImageService

    App\Media\Application\Port\ImageConversionPortInterface:
        alias: App\Media\Infrastructure\Converter\GdImageConverter

    App\Media\Application\Port\MediaAdminPortInterface:
        alias: App\Media\Infrastructure\Admin\MediaAdminService

    # --- Media Storage ---
    App\Media\Infrastructure\Storage\FlysystemStorage:
        arguments:
            $basePath: '%kernel.project_dir%/storage'

    App\Media\Application\Port\StoragePortInterface:
        alias: App\Media\Infrastructure\Storage\FlysystemStorage

    App\Filesystem\Application\Port\MimeDetectorPortInterface:
        alias: App\Filesystem\Mime\MimeDetector

    # --- Filesystem ---
    App\Filesystem\Application\Port\LocalFilesystemPortInterface:
        alias: App\Filesystem\Infrastructure\Service\LocalFilesystem

    App\Filesystem\Infrastructure\Service\LocalFilesystem:
        arguments:
            $basePath: '%kernel.project_dir%/storage/media'

    # --- Media Stream ---
    App\Media\Application\Port\StreamPortInterface:
        alias: App\Media\Infrastructure\Service\StreamService

    App\Media\Interface\Controller\StreamController:
        arguments:
            $mediaBasePath: '%kernel.project_dir%/storage/media'

    # --- Recommendation Domain Repository Aliases ---
    App\Recommendation\Domain\Repository\RecommendationRepositoryInterface:
        alias: App\Recommendation\Infrastructure\Doctrine\Repository\RecommendationRepository
    App\Recommendation\Domain\Repository\RecommendationJobRepositoryInterface:
        alias: App\Recommendation\Infrastructure\Doctrine\Repository\RecommendationJobRepository

    # --- Recommendation Application Ports ---
    App\Recommendation\Application\Port\RecommendationInsightsPortInterface:
        alias: App\Recommendation\Infrastructure\Doctrine\Repository\RecommendationInsightsRepository
    App\Recommendation\Application\Port\RecommendationJobPortInterface:
        alias: App\Recommendation\Infrastructure\RecommendationJobService

    # --- CPU Process Pool Worker ---
    App\Recommendation\Infrastructure\Swoole\RecommendationPoolWorker:
        tags:
            - { name: 'swoole.cpu_pool_worker' }

    # --- Playlist Domain Repository Aliases ---
    App\Playlist\Domain\Repository\PlaylistRepositoryInterface:
        alias: App\Playlist\Infrastructure\Doctrine\Repository\PlaylistRepository

    # --- Activity Domain Repository Aliases ---
    App\Activity\Domain\Repository\MediaActivityRepositoryInterface:
        alias: App\Activity\Infrastructure\Doctrine\Repository\MediaActivityRepository

    # --- Activity Application Ports ---
    App\Activity\Application\Port\ActivityPortInterface:
        alias: App\Activity\Infrastructure\ActivityService

    App\Activity\Application\Port\ActivityAnalyticsPortInterface:
        alias: App\Activity\Infrastructure\Doctrine\Repository\ActivityAnalyticsRepository

    # --- Playlist Application Ports ---
    App\Playlist\Application\Port\PlaylistPortInterface:
        alias: App\Playlist\Infrastructure\PlaylistService

    # --- Notification Domain Repository Aliases ---
    App\Notification\Domain\Repository\NotificationRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\Repository\NotificationRepository
    App\Notification\Domain\Repository\NotificationPreferenceRepositoryInterface:
        alias: App\Notification\Infrastructure\Doctrine\Repository\NotificationPreferenceRepository

    # --- Notification Email ---
    App\Notification\Application\Handler\SendEmailHandler:
        arguments:
            $appDomain: '%app.domain%'
            $appName: '%app.name%'

    # --- Notification Push ---
    App\Notification\Infrastructure\Push\PushSubscriptionRepositoryInterface:
        alias: App\Notification\Infrastructure\Push\PushSubscriptionRepository

    Minishlink\WebPush\WebPush:
        arguments:
            $auth:
                VAPID:
                    subject: 'mailto:admin@example.com'
                    publicKey: '%env(VAPID_PUBLIC_KEY)%'
                    privateKey: '%env(VAPID_PRIVATE_KEY)%'

    App\Notification\Application\Handler\SendPushHandler:
        arguments:
            $appDomain: '%app.domain%'

    # --- Notification Webhook ---
    App\Notification\Infrastructure\Webhook\WebhookDeliveryService: ~

    # --- UserPreference Application Ports ---
    App\UserPreference\Application\Port\SidebarConfigPortInterface:
        alias: App\UserPreference\Infrastructure\SidebarConfigAdapter
    App\UserPreference\Application\Port\AccentColorPortInterface:
        alias: App\UserPreference\Infrastructure\AccentColorAdapter
    App\UserPreference\Application\Port\ThemeMoodPortInterface:
        alias: App\UserPreference\Infrastructure\ThemeMoodAdapter
    App\UserPreference\Application\Port\AudioPreferencesPortInterface:
        alias: App\UserPreference\Infrastructure\AudioPreferencesAdapter
    App\UserPreference\Application\Port\PlayerPreferencesPortInterface:
        alias: App\UserPreference\Infrastructure\PlayerPreferencesAdapter
    App\UserPreference\Application\Port\LayoutPreferencesPortInterface:
        alias: App\UserPreference\Infrastructure\LayoutPreferencesAdapter

    # --- UserPreference Domain Repository Aliases ---
    App\UserPreference\Domain\Repository\SidebarConfigRepositoryInterface:
        alias: App\UserPreference\Infrastructure\Doctrine\Repository\SidebarConfigDoctrineRepository
    App\UserPreference\Domain\Repository\AccentColorRepositoryInterface:
        alias: App\UserPreference\Infrastructure\Doctrine\Repository\AccentColorDoctrineRepository
    App\UserPreference\Domain\Repository\ThemeMoodRepositoryInterface:
        alias: App\UserPreference\Infrastructure\Doctrine\Repository\ThemeMoodDoctrineRepository
    App\UserPreference\Domain\Repository\AudioPreferencesRepositoryInterface:
        alias: App\UserPreference\Infrastructure\Doctrine\Repository\AudioPreferencesDoctrineRepository
    App\UserPreference\Domain\Repository\PlayerPreferencesRepositoryInterface:
        alias: App\UserPreference\Infrastructure\Doctrine\Repository\PlayerPreferencesDoctrineRepository
    App\UserPreference\Domain\Repository\LayoutPreferencesRepositoryInterface:
        alias: App\UserPreference\Infrastructure\Doctrine\Repository\LayoutPreferencesDoctrineRepository
    App\UserPreference\Domain\Repository\PreferenceHistoryRepositoryInterface:
