            $spotifyClientSecret: '%env(SPOTIFY_CLIENT_SECRET)%'
            $tasteDiveApiKey: '%env(TASTE_DIVE_API_KEY)%'

    # --- Swoole Task Worker Fallback Sender ---
    # Wraps SwooleServerTaskSender to fall back to Redis when the task queue is full
    # or the server is shutting down. Uses SwooleTaskDispatcherInterface to
    # decouple from the Swoole bundle's HttpServer class.
    App\Shared\Infrastructure\Messenger\HttpServerTaskDispatcher:
        arguments:
            $httpServer: '@SwooleBundle\SwooleBundle\Server\HttpServer'

    App\Shared\Infrastructure\Messenger\SwooleTaskDispatcherInterface:
        alias: App\Shared\Infrastructure\Messenger\HttpServerTaskDispatcher

    App\Shared\Infrastructure\Messenger\SwooleTaskWithRedisFallbackSender:
        decorates: 'SwooleBundle\SwooleBundle\Bridge\Symfony\Messenger\SwooleServerTaskSender'
        arguments:
            $dispatcher: '@App\Shared\Infrastructure\Messenger\HttpServerTaskDispatcher'
            $redisFallback: '@messenger.transport.async'
            $logger: '@logger'

    # --- Swoole Task Job Monitor ---
    # Decorates the Swoole TaskHandler to track async jobs in job_monitors.
    # Priority -5 places it just inside SwooleServerTaskTransportHandler (-10),
    # so it wraps bus->dispatch() but stays outside the service-reset handlers.
    App\Shared\Infrastructure\Messenger\SwooleTaskJobMonitorDecorator:
        decorates: 'SwooleBundle\SwooleBundle\Bridge\Symfony\Messenger\SwooleServerTaskTransportHandler'
        arguments:
            $decorated: '@.inner'

    # --- Messenger Middleware ---
    App\Shared\Infrastructure\Messenger\CorrelationIdMiddleware:
        tags: [ 'messenger.middleware' ]

    App\Shared\Infrastructure\Messenger\JobMonitoringMiddleware:
        tags: [ 'messenger.middleware' ]

    App\Shared\Infrastructure\Messenger\ResultStampMiddleware:
        arguments:
            $stampClasses: '%app.result_stamp_classes%'
        tags: [ 'messenger.middleware' ]

    # --- Job Monitor Worker Events ---
    App\Shared\Infrastructure\Messenger\WorkerJobMonitorSubscriber:
        tags:
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Messenger\Event\WorkerMessageReceivedEvent', method: 'onMessageReceived' }
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Messenger\Event\WorkerMessageHandledEvent', method: 'onMessageHandled' }
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Messenger\Event\WorkerMessageFailedEvent', method: 'onMessageFailed' }

    App\Shared\Infrastructure\Messenger\JobMessageSerializer:
        arguments:
            $serializer: '@job_monitor.serializer'
            $maxPayloadSize: '%env(int:JOB_MONITOR_MAX_PAYLOAD_SIZE)%'

    job_monitor.serializer:
        class: Symfony\Component\Serializer\Serializer
        factory: [ 'App\Shared\Infrastructure\Messenger\JobMessageSerializerFactory', 'create' ]
        arguments:
            $propertyAccessor: '@property_accessor'
            $uuidNormalizer: '@App\Shared\Infrastructure\Messenger\UuidNormalizer'
            $publicIdNormalizer: '@App\Shared\Infrastructure\Messenger\PublicIdNormalizer'

    App\Shared\Infrastructure\Messenger\UuidNormalizer: ~
    App\Shared\Infrastructure\Messenger\PublicIdNormalizer: ~

    # --- Cache Bindings ---
    Psr\Cache\CacheItemPoolInterface $tokenCache: '@cache.tags'

    # --- Logging Processors ---
    App\Shared\Infrastructure\Logging\CorrelationIdProcessor:
        tags:
            - { name: 'monolog.processor' }
            - { name: 'kernel.reset', method: 'reset' }

    App\Shared\Infrastructure\Logging\BoundedContextProcessor:
        tags: [ 'monolog.processor' ]

    Symfony\Bridge\Monolog\Processor\WebProcessor:
        tags: [ 'monolog.processor' ]

    # --- Per-Context Logger Channel Bindings ---
    # Handled by BoundedContextLoggerPass (registers automatically via Kernel)

    App\Shared\Infrastructure\EventListener\ConfigBootCheckListener:
        arguments:
            $appEnv: '%env(APP_ENV)%'

    # --- OpenAPI ---
    Nelmio\ApiDocBundle\OpenApiGenerator:
        alias: nelmio_api_doc.open_api.generator
    Nelmio\ApiDocBundle\Render\RenderOpenApi:
        alias: nelmio_api_doc.render_docs

    # SeekSignalBroker channel stats — one of potentially many channel providers
    App\Transcode\Infrastructure\Swoole\SeekSignalChannelStats:
        tags: [ 'app.swoole.channel_provider' ]

    # --- Transcode Domain Repository Aliases ---
    App\Transcode\Domain\Repository\TranscodeJobRepositoryInterface:
        alias: App\Transcode\Infrastructure\Doctrine\Repository\TranscodeJobRepository
    App\Transcode\Domain\Repository\TranscodeSessionRepositoryInterface:
        alias: App\Transcode\Infrastructure\Doctrine\Repository\TranscodeSessionRepository

    # --- Transcode CQRS Query Port Aliases ---
    App\Transcode\Application\Query\TranscodeJobQueryPort:
        alias: App\Transcode\Infrastructure\Doctrine\Query\TranscodeJobQuery
    App\Transcode\Application\Query\TranscodeSessionQueryPort:
        alias: App\Transcode\Infrastructure\Doctrine\Query\TranscodeSessionQuery

    # --- Transcode Application Port Aliases ---
    App\Transcode\Application\Port\TranscodeSessionPortInterface:
        alias: App\Transcode\Infrastructure\Transcode\TranscodeSessionService
    App\Transcode\Application\Port\TranscodeJobPortInterface:
        alias: App\Transcode\Infrastructure\Transcode\TranscodeJobService
    App\Transcode\Application\Port\TranscodeStreamingPortInterface:
        alias: App\Transcode\Infrastructure\Transcode\CachedTranscodeStreamingService

    App\Transcode\Application\Port\StreamAuthPortInterface:
        alias: App\Transcode\Infrastructure\Auth\HmacStreamAuthAdapter
    App\Transcode\Application\Port\FFmpegPortInterface:
        alias: App\Transcode\Infrastructure\FFmpeg\FFmpegAdapter
    App\Transcode\Application\Port\TranscodeStoragePortInterface:
        alias: App\Transcode\Infrastructure\Storage\TranscodeFileStorage
    App\Transcode\Application\Port\SegmentCachePortInterface:
        alias: App\Transcode\Infrastructure\Cache\InMemorySegmentCache

    # --- Transcode Auth ---
    App\Transcode\Infrastructure\Auth\HmacStreamAuthAdapter:
        arguments:
            $hmacSecret: '%env(STREAM_URL_HMAC_SECRET)%'

    # --- Transcode Cache Decorator ---
    App\Transcode\Infrastructure\Transcode\CachedTranscodeStreamingService:
        decorates: App\QoL\Infrastructure\Swoole\QualityFilteringStreamingDecorator
        arguments:
            $inner: '@.inner'

    # --- Transcode Infrastructure ---
    App\Transcode\Infrastructure\Storage\SegmentFileResolver:
        arguments:
            $basePath: '%env(CONVERT_STORAGE_PATH)%'

    App\Transcode\Infrastructure\Storage\TranscodeFileStorage:
        arguments:
            $resolver: '@App\Transcode\Infrastructure\Storage\SegmentFileResolver'

    App\Transcode\Infrastructure\FFmpeg\FFprobeAdapter:
        arguments:
            $ffprobePath: '%env(FFPROBE_PATH)%'

    App\Metadata\Infrastructure\Api\Tmdb\TmdbAdapter:
        arguments:
            $bearerToken: '%env(TMDB_BEARER_TOKEN)%'

    # --- Hardware Acceleration Prober ---
    App\Transcode\Infrastructure\FFmpeg\HardwareCapabilitiesProber:
        arguments:
            $ffmpegPath: '%env(FFMPEG_PATH)%'
            $preferredEncoder: '%env(VIDEO_ENCODER)%'
            $hwAccelDevice: '%env(HW_ACCEL_DEVICE)%'
            $bitrateMultiplier: '%env(float:HW_BITRATE_MULTIPLIER)%'
        tags:
            - { name: 'swoole_bundle.bootable_service' }

    App\Transcode\Infrastructure\HLS\FMP4SegmentWriter:
        arguments:
            $ffmpegPath: '%env(FFMPEG_PATH)%'
            $encoderProfile: '@=service("App\\Transcode\\Infrastructure\\FFmpeg\\HardwareCapabilitiesProber").getProfile()'

    App\Transcode\Infrastructure\FFmpeg\FFmpegAdapter:
        arguments:
            $ffmpegPath: '%env(FFMPEG_PATH)%'
            $encoderProfile: '@=service("App\\Transcode\\Infrastructure\\FFmpeg\\HardwareCapabilitiesProber").getProfile()'
            $ffprobeAdapter: '@App\Transcode\Infrastructure\FFmpeg\FFprobeAdapter'
            $fmp4Writer: '@App\Transcode\Infrastructure\HLS\FMP4SegmentWriter'

    # --- CPU Process Pool ---
    # Generic pool infrastructure — tagged handlers auto-discovered at boot.
    # Workers run in isolated processes with SWOOLE_IPC_UNIXSOCK.
    App\Transcode\Infrastructure\Swoole\TranscodePoolWorker:
        tags:
            - { name: 'swoole.cpu_pool_worker' }

    App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool:
        arguments:
            $handlers: !tagged_iterator 'swoole.cpu_pool_worker'
            $workerCount: 2
            $resultTableSize: 8192
        tags:
            - { name: 'swoole_bundle.bootable_service' }

    App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPoolShutdownHandler:
        arguments:
            $cpuProcessPoolLocator: !service_locator
                App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool: '@App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool'

    SwooleBundle\SwooleBundle\Server\LifecycleHandler\ServerShutdownHandler:
        class: App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPoolShutdownHandler
        arguments:
            $cpuProcessPoolLocator: !service_locator
                App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool: '@App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool'

    App\Transcode\Infrastructure\Swoole\TranscodeProcessPool:
        arguments:
            $pool: '@App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool'
            $encoderProfile: '@=service("App\\Transcode\\Infrastructure\\FFmpeg\\HardwareCapabilitiesProber").getProfile()'

    App\Transcode\Infrastructure\FFmpeg\SegmentEncoder:
        arguments:
            $encoderProfile: '@=service("App\\Transcode\\Infrastructure\\FFmpeg\\HardwareCapabilitiesProber").getProfile()'
            $bitrateMultiplier: '@=service("App\\Transcode\\Infrastructure\\FFmpeg\\HardwareCapabilitiesProber").getBitrateMultiplier()'

    App\Transcode\Infrastructure\Swoole\JobStatePersister:
        arguments:
            $stateDir: '%kernel.project_dir%/var/transcode_state'
            $jsonEncoder: '@json_encoder'

    App\Transcode\Infrastructure\Swoole\TranscodeSessionSubscriber:
        arguments:
            $videoRepository: '@App\Catalog\Domain\Repository\VideoRepositoryInterface'
            $jsonEncoder: '@json_encoder'
            $bookingTable: '@App\Transcode\Infrastructure\Swoole\SegmentBookingTable'
        tags:
            - { name: 'kernel.event_listener', event: 'App\Transcode\Domain\Event\TranscodeSessionAttached' }

    App\Transcode\Infrastructure\Swoole\SegmentBookingTable: ~

    App\Transcode\Infrastructure\Swoole\SeekAwarePrefetcher:
        arguments:
            $bookingTable: '@App\Transcode\Infrastructure\Swoole\SegmentBookingTable'
            $cache: '@App\Transcode\Application\Port\SegmentCachePortInterface'
            $processPool: '@App\Shared\Infrastructure\Swoole\ProcessPool\CpuProcessPool'

    App\Transcode\Infrastructure\Swoole\PrefetchPositionListener:
        tags:
            - { name: 'kernel.event_listener', event: 'App\Transcode\Domain\Event\PlaybackPositionChanged' }

    App\Transcode\Infrastructure\Swoole\GracefulRestartHandler:
        arguments:
            $processPool: '@App\Transcode\Infrastructure\Swoole\TranscodeProcessPool'
            $eventDispatcher: '@event_dispatcher'

    App\Transcode\Infrastructure\Swoole\PlaybackPositionChangedListener:
        tags:
            - { name: 'kernel.event_listener', event: 'App\Transcode\Domain\Event\PlaybackPositionChanged' }

    # --- Party Domain Repository Aliases ---
    App\Party\Domain\Repository\SyncedPartySessionRepositoryInterface:
