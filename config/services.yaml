    # --- Discovery Domain Repository Aliases ---
    App\Discovery\Domain\Repository\ServerInstanceRepositoryInterface:
        alias: App\Discovery\Infrastructure\Doctrine\Repository\ServerInstanceRepository
    App\Discovery\Domain\Repository\PairingSessionRepositoryInterface:
        alias: App\Discovery\Infrastructure\Doctrine\Repository\PairingSessionRepository

    # --- Discovery Application Port Aliases ---
    App\Discovery\Application\Port\DiscoveryPortInterface:
        alias: App\Discovery\Infrastructure\DiscoveryService
    App\Discovery\Application\Port\ServerInstancePortInterface:
