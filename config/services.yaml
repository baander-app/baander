    App\Favorites\Domain\Repository\UserFavoriteRepositoryInterface:
        alias: App\Favorites\Infrastructure\Doctrine\Repository\UserFavoriteRepository

    # --- Favorites Application Port Aliases ---
    App\Favorites\Application\Port\FavoritesPortInterface:
        alias: App\Favorites\Infrastructure\FavoritesService

