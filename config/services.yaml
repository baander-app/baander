    App\Radio\Domain\Repository\StarredStation\StarredStationRepositoryInterface:
        alias: App\Radio\Infrastructure\Doctrine\Repository\StarredStationDoctrineRepository
    App\Radio\Domain\Repository\RadioSession\RadioSessionRepositoryInterface:
        alias: App\Radio\Infrastructure\Doctrine\Repository\RadioSessionDoctrineRepository

    # --- Radio Application Port Aliases ---
    App\Radio\Application\Port\RadioSourcePortInterface:
