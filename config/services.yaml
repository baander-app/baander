    App\Shared\Domain\Event\Outbox\OutboxRepository: ~
    App\Shared\Domain\Event\Outbox\OutboxSubscriber: ~
    App\Shared\Domain\Event\Outbox\RelayOutboxHandler: ~

    # --- QoL Governor ---
    App\QoL\Domain\Service\StreamGovernor:
        arguments:
            $model: '@App\QoL\Domain\Service\LearningModel'

    App\QoL\Domain\Service\LearningModel: ~

    # QoL CPU/GPU sampler — Bootable (Table created before fork)
    App\QoL\Infrastructure\Swoole\CpuGpuSampler:
        tags:
            - { name: 'swoole_bundle.bootable_service' }

    # QoL Learning Engine
    App\QoL\Infrastructure\Swoole\LearningDataPersister:
        arguments:
            $prober: '@App\Transcode\Infrastructure\FFmpeg\HardwareCapabilitiesProber'
            $stateDir: '%kernel.project_dir%/var/qol_state'
            $jsonEncoder: '@json_encoder'

    App\QoL\Infrastructure\Swoole\LearningEngineSubscriber: ~

    # QoL Capacity Enforcement
    App\QoL\Infrastructure\Swoole\SessionBudgetSubscriber: ~

    # BudgetGuard injected into TranscodeSessionSubscriber via autowiring
    App\Transcode\Application\Port\BudgetGuardInterface:
        alias: App\QoL\Infrastructure\Transcode\BudgetGuard

    App\QoL\Infrastructure\Transcode\BudgetGuard: ~

    # QoL Manifest Filtering Decorator
    # Chain: alias → CachedTranscodeStreamingService → QualityFilteringStreamingDecorator → TranscodeStreamingService
    App\QoL\Infrastructure\Swoole\QualityFilteringStreamingDecorator:
        decorates: App\Transcode\Infrastructure\Transcode\TranscodeStreamingService
        decoration_priority: -1
        arguments:
            $inner: '@.inner'

    # QoL Mid-Stream Monitor
    App\QoL\Infrastructure\Swoole\MidStreamMonitor: ~

    # QoL Admin
    App\QoL\Application\Port\QoLAdminPortInterface:
        alias: App\QoL\Infrastructure\QoLAdminService

    App\QoL\Infrastructure\QoLAdminService: ~
