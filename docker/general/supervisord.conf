[supervisord]
nodaemon = true
logfile = /dev/null
logfile_maxbytes = 0
pidfile = /tmp/supervisord.pid
minfds = 10000

;[program:messenger-worker]
;process_name=%(program_name)s_%(process_num)02d
;command=/usr/local/bin/php /var/www/html/bin/console messenger:consume async --time-limit=3600 --memory-limit=256M --limit=1000
;numprocs=2
;autostart=true
;autorestart=true
;user=www-data
;group=www-data
;stdout_logfile=/dev/fd/1
;stdout_logfile_maxbytes=0
;stderr_logfile=/dev/fd/2
;stderr_logfile_maxbytes=0
