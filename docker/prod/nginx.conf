map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream upstream_backend_php {
    server app:9501;
    keepalive 64;
}

# Production: HTTP only.
# Sits behind an external reverse proxy (Traefik, nginx, Cloudflare, etc.)
# that handles TLS termination and forwards plain HTTP here.
server {
    listen 80;
    server_name _;

    charset utf-8;
    server_tokens off;

    # Trust X-Forwarded-* headers from the upstream reverse proxy
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Media uploads (audio, video, images) can be up to 100MB
    client_max_body_size 100m;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --- Gzip compression for text-based responses ---

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/vnd.apple.mpegurl
        application/dash+xml
        application/xml
        text/plain
        text/css
        text/javascript
        application/javascript
        image/svg+xml;

    # --- Shared proxy headers (inherited by all location blocks) ---

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Http_Host $http_host;
    proxy_set_header Scheme $scheme;
    proxy_set_header SERVER_PORT $server_port;
    proxy_set_header REMOTE_ADDR $remote_addr;
    proxy_set_header Connection '';

    # --- Deny hidden files (except .well-known) ---

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ============================================================
    # Streaming: HLS/DASH video segments
    # ============================================================

    location ~ ^/api/stream/.+\.m4s$ {
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 256k;
        proxy_pass http://upstream_backend_php;
    }

    location ~ ^/api/stream/.+/init\.mp4$ {
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 64k;
        proxy_pass http://upstream_backend_php;
    }

    location ~ ^/api/stream/.+\.(m3u8|mpd)$ {
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 2 4k;
        proxy_busy_buffers_size 4k;
        proxy_pass http://upstream_backend_php;
    }

    # ============================================================
    # Streaming: audio (music) with HTTP Range / seek support
    # ============================================================

    location ~ ^/api/stream/(track|media)$ {
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_pass http://upstream_backend_php;
    }

    # ============================================================
    # Images: binary file delivery
    # ============================================================

    location ~ ^/api/images/[^/]+/file$ {
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 64k;
        proxy_pass http://upstream_backend_php;
    }

    # ============================================================
    # Everything else: API JSON, SSE, WebSocket
    # ============================================================

    location / {
        limit_except GET POST HEAD OPTIONS PUT DELETE PATCH {
            deny all;
        }

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        proxy_pass http://upstream_backend_php;
    }
}
