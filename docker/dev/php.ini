;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; PHP 8.5 — Baander Development Config ;
; Symfony 8 · Swoole · PostgreSQL      ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[PHP]

; ---- Language ----
engine = On
short_open_tag = Off
precision = 14
output_buffering = 4096
implicit_flush = Off
serialize_precision = -1
zend.enable_gc = On
zend.exception_ignore_args = Off
zend.exception_string_param_max_len = 15
zend.assertions = 1

; ---- Character Encoding ----
default_charset = "UTF-8"

; ---- Resource Limits ----
; Unlimited — Swoole manages worker lifecycle via worker_max_request (5000 reqs).
; A hard limit here would kill long-running media processing, metadata enrichment,
; and SSE connections. The real guard against runaway workers is Swoole's restart.
max_execution_time = -1
max_input_time = 60
memory_limit = 2048M

; ---- File Uploads ----
; Media library server — large uploads are expected.
file_uploads = On
upload_max_filesize = 100M
post_max_size = 110M
max_file_uploads = 20

; ---- Security ----
expose_php = Off
allow_url_include = Off
disable_functions =
disable_classes =

; ---- Error Handling ----
; Dev mode: show everything, log everything.
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
report_memleaks = On

; ---- Data Handling ----
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On

; ---- Paths ----
enable_dl = Off
doc_root =
user_dir =

; ---- File Wrappers ----
allow_url_fopen = On
default_socket_timeout = 60

; ---- Realpath Cache ----
; Symfony loads thousands of files via Composer. A large realpath cache avoids
; redundant stat() syscalls on every request (especially impactful in Swoole
; where the cache persists across requests within a worker).
realpath_cache_size = 4096k
realpath_cache_ttl = 600

;;;;;;;;;;;;;;;;;;;;;
; Swoole            ;
;;;;;;;;;;;;;;;;;;;;;
[Swoole]
; Required: when "On" (default), async functions are renamed to their "go"
; variants (e.g. sleep → Swoole\Coroutine::sleep), breaking Symfony code
; that expects standard PHP function names inside the Swoole server.
swoole.use_shortname = Off

;;;;;;;;;;;;;;;;;;;;;
; OPcache           ;
;;;;;;;;;;;;;;;;;;;;;
[opcache]
; OPcache is critical for Swoole — each worker process loads the full
; Symfony kernel once, and OPcache keeps compiled opcodes in shared memory.
; With Swoole process mode, all workers share the same OPcache instance.

opcache.enable = 1
opcache.enable_cli = 1

; 256 MB shared memory for compiled opcodes. Symfony 8 + Doctrine + all
; bundles easily fill the default 128 MB on a project this size.
opcache.memory_consumption = 256

; 32 MB for interned strings. Symfony generates many unique strings via
; DI container compilation, route matching, and Doctrine DQL.
opcache.interned_strings_buffer = 32

; 20k scripts — Symfony projects easily exceed the default 10k when you
; count vendor files, generated DI containers, and Doctrine proxies.
opcache.max_accelerated_files = 20000

; Dev mode: validate timestamps every request so HMR picks up changes.
; For production, set to 0 and rely on cache:clear + Swoole restart.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Keep comments — Symfony's DI container and Doctrine annotations/attributes
; rely on reflection metadata stored in comments.
opcache.save_comments = 1

; Record compilation warnings so deprecation notices appear in dev.
opcache.record_warnings = 1

; JIT is disabled — Swoole overrides zend_execute_ex(), which is fundamentally
; incompatible with JIT. OPcache alone provides the real performance win for
; Swoole by keeping compiled opcodes in shared memory across requests.
opcache.jit = off
opcache.jit_buffer_size = 0

; Other optimizations
opcache.optimization_level = 0x7FFFBFFF
opcache.max_wasted_percentage = 10
opcache.file_update_protection = 0

;;;;;;;;;;;;;;;;;;;;;
; Session           ;
;;;;;;;;;;;;;;;;;;;;;
[Session]
session.save_handler = files
session.use_strict_mode = 0
session.use_cookies = 1
session.use_only_cookies = 1
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_httponly =
session.cookie_samesite =
session.serialize_handler = php
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440
session.cache_limiter = nocache
session.cache_expire = 180
session.use_trans_sid = 0

; NOTE: session.sid_length and session.sid_bits_per_character were removed in
; PHP 8.5. Session ID generation is now controlled by session.sid_length_function
; (default: session.create_sid), which you can override with a custom callable.

;;;;;;;;;;;;;;;;;;;;;
; PostgreSQL        ;
;;;;;;;;;;;;;;;;;;;;;
[PostgreSQL]
pgsql.allow_persistent = On
pgsql.auto_reset_persistent = Off
pgsql.max_persistent = -1
pgsql.max_links = -1
pgsql.ignore_notice = 0
pgsql.log_notice = 0

;;;;;;;;;;;;;;;;;;;;;
; Date              ;
;;;;;;;;;;;;;;;;;;;;;
[Date]
; Set via APP_TIMEZONE env var in Symfony — left empty here so Symfony
; can configure it without INI conflicts.
;date.timezone =

;;;;;;;;;;;;;;;;;;;;;
; mbstring          ;
;;;;;;;;;;;;;;;;;;;;;
[mbstring]
; Required for UTF-8 metadata from external APIs (Discogs, MusicBrainz, etc.).
; Defaults to default_charset (UTF-8) when empty — no explicit setting needed.

;;;;;;;;;;;;;;;;;;;;;
; PCRE              ;
;;;;;;;;;;;;;;;;;;;;;
[Pcre]
; Default limits are fine for this project.

;;;;;;;;;;;;;;;;;;;;;
; Opcache (CLI)     ;
;;;;;;;;;;;;;;;;;;;;;
[CLI Server]
cli_server.color = On

;;;;;;;;;;;;;;;;;;;;;
; cURL              ;
;;;;;;;;;;;;;;;;;;;;;
[curl]
; Point to the container's CA bundle if needed for external API calls
; (Discogs, Last.fm, Spotify, MusicBrainz, TasteDive).
;curl.cainfo =

;;;;;;;;;;;;;;;;;;;;;
; OpenSSL           ;
;;;;;;;;;;;;;;;;;;;;;
[openssl]
; Use OS-managed cert stores by default.
;openssl.cafile =
;openssl.capath =
