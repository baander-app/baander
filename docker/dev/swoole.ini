[swoole]
extension=swoole.so

; Disable short-name aliases (Co\, go(), etc.) — Swoole 6 removed them.
; The swoole-bundle patch already uses Swoole\Coroutine directly.
swoole.use_shortname = Off

; Enable coroutine hooks for PHP standard library (file, curl, sockets, etc.)
swoole.enable_library = On

; Detect blocking IO calls inside coroutines (dev only — has overhead)
swoole.blocking_detection = On

; Display errors in Swoole workers (dev only)
swoole.display_errors = On

; Disable fiber mock — use real PHP fibers
swoole.enable_fiber_mock = Off

; No preemptive scheduler — cooperative coroutines only
swoole.enable_preemptive_scheduler = Off

; Disable leak detection (dev only — enable to debug memory leaks)
swoole.leak_detection = Off

; Disable profiling (enable with xdebug for profiling Swoole internals)
swoole.profile = Off

; 8MB socket buffer — matches the swoole.yaml buffer_output_size
swoole.socket_buffer_size = 8388608
