appId: app.baander.desktop
productName: "Baander"

# Displayed in app metadata and installers
copyright: "© 2025-2026 Martin Christiansen"

afterPack: "build/afterPack.cjs"

directories:
    output: dist/release
    buildResources: build

files:
    -   from: "dist/renderer"
        to: "."
    -   from: "dist/main"
        to: "."
    -   from: "public"
        to: "public"
    -   from: "dist/preload"
        to: "."
    - package.json

extraResources:
    -   from: "public/dsp"
        to: "dsp"

extraMetadata:
    main: index.js

win:
    target:
        - nsis
        - zip
    icon: build/app-icons/icon.ico

nsis:
    oneClick: false                       # show wizard UI
    perMachine: false                     # set to true to default to "Install for all users"
    allowToChangeInstallationDirectory: true
    createDesktopShortcut: true
    createStartMenuShortcut: true
    artifactName: "${name}-${version}-Setup.${ext}"
    displayLanguageSelector: false
    deleteAppDataOnUninstall: true

mac:
    target:
        - dmg
        - zip
    icon: build/app-icons/icon.icns

linux:
    target:
        - AppImage
        - deb
    icon: build/app-icons/icon.png
